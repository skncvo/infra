apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitlab-nodeport.cicd.svc.cluster.local/devops/devops-platform.git
    targetRevision: main
    path: platform/gitlab
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
