apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: 80.14.2
    helm:
      values: |
        prometheus:
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            securityContext:
              fsGroup: 2000
              runAsGroup: 2000
              runAsUser: 1000
              runAsNonRoot: true
        grafana:
          enabled: true
          dnsPolicy: Default
          # [추가] 포드 내부의 /etc/hosts에 강제로 IP를 등록.
          initChownData:
            enabled: false
          podSecurityContext:
            fsGroup: 472  
            runAsGroup: 472
            runAsUser: 472
          persistence:
            enabled: true
            storageClassName: "local-path"
            size: 10Gi
          service:
            type: ClusterIP
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"
                  resources:
                    requests:
                      storage: 10Gi
          service:
            type: ClusterIP
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  
  # [수정/추가] OutOfSync 방지를 위한 설정
  ignoreDifferences:
    - group: ""
      kind: Namespace
      name: monitoring
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
