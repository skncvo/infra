- name: Ensure apt keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Kubernetes apt repository key
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'
    force: true

- name: Configure Kubernetes apt repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    owner: root
    group: root
    mode: '0644'
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_minor }}/deb/ /

- name: Update apt cache after adding Kubernetes repo
  apt:
    update_cache: yes

- name: Install Kubernetes packages
  apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present

- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet service
  systemd:
    name: kubelet
    enabled: yes

- name: Start kubelet service
  systemd:
    name: kubelet
    state: started

- name: Verify kubelet service state
  command: systemctl is-active kubelet
  register: kubelet_active
  changed_when: false
  failed_when: kubelet_active.stdout.strip() not in ['active', 'activating']
